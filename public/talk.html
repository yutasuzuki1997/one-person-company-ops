<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>トーク</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #060810;
    --bg2: #0d1117;
    --bg3: #161b27;
    --border: #1e2a3a;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --accent: #38bdf8;
    --agent-color: #38bdf8;
  }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ── ヘッダー ── */
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 60px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 20px -8px var(--agent-color);
  }

  .agent-avatar {
    font-size: 28px;
    width: 44px; height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg3);
    border-radius: 12px;
    border: 2px solid var(--agent-color);
    box-shadow: 0 0 10px -2px var(--agent-color);
    flex-shrink: 0;
  }

  .agent-header-info { flex: 1; min-width: 0; }
  .agent-header-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
  }
  .agent-header-role { font-size: 12px; color: var(--text2); margin-top: 1px; }

  .status-area {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text2);
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #ef4444;
    transition: background 0.3s;
  }
  .status-dot.connected { background: #22c55e; box-shadow: 0 0 6px #22c55e; }

  .back-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    flex-shrink: 0;
  }
  .back-btn:hover { border-color: var(--text2); color: var(--text); }

  /* ── チャットエリア ── */
  .chat-area {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* エージェント出力バブル（左） */
  .bubble-agent {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    max-width: 82%;
    align-self: flex-start;
  }
  .bubble-agent-avatar {
    font-size: 20px;
    width: 34px; height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg3);
    border-radius: 8px;
    border: 1px solid var(--agent-color);
    flex-shrink: 0;
    margin-top: 2px;
  }
  .bubble-agent-body {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-left: 2px solid var(--agent-color);
    border-radius: 0 10px 10px 10px;
    padding: 10px 12px;
    min-width: 80px;
  }
  .bubble-agent-name {
    font-size: 10px;
    color: var(--agent-color);
    font-weight: 600;
    margin-bottom: 5px;
  }
  .bubble-terminal {
    font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
    font-size: 11px;
    line-height: 1.5;
    color: #c9d1d9;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 400px;
    overflow-y: auto;
  }
  .bubble-terminal::-webkit-scrollbar { width: 3px; }
  .bubble-terminal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ユーザーメッセージバブル（右） */
  .bubble-user {
    align-self: flex-end;
    max-width: 70%;
  }
  .bubble-user-body {
    background: var(--agent-color);
    color: #000;
    border-radius: 10px 10px 0 10px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 500;
    line-height: 1.5;
    word-break: break-word;
  }
  .bubble-user-time {
    font-size: 9px;
    color: var(--text2);
    text-align: right;
    margin-top: 3px;
    opacity: 0.6;
  }

  /* ── 入力エリア ── */
  .input-area {
    flex-shrink: 0;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .input-area textarea {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-family: inherit;
    outline: none;
    resize: none;
    min-height: 40px;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.15s;
  }
  .input-area textarea:focus { border-color: var(--agent-color); }
  .send-btn {
    background: var(--agent-color);
    color: #000;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    flex-shrink: 0;
    transition: opacity 0.15s;
    align-self: flex-end;
  }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:active { transform: scale(0.97); }

  /* ANSI */
  .ansi-bold { font-weight: bold; }
  .ansi-30 { color: #4b5563; } .ansi-31 { color: #ff5555; }
  .ansi-32 { color: #50fa7b; } .ansi-33 { color: #f1fa8c; }
  .ansi-34 { color: #6272a4; } .ansi-35 { color: #ff79c6; }
  .ansi-36 { color: #8be9fd; } .ansi-37 { color: #f8f8f2; }
  .ansi-90 { color: #4b5563; } .ansi-91 { color: #ff6e6e; }
  .ansi-92 { color: #69ff47; } .ansi-93 { color: #ffffa5; }
  .ansi-94 { color: #d6acff; } .ansi-95 { color: #ff92df; }
  .ansi-96 { color: #a4ffff; } .ansi-97 { color: #fff; }
</style>
</head>
<body>

<header id="talkHeader">
  <div class="agent-avatar" id="hAvatar">⏳</div>
  <div class="agent-header-info">
    <div class="agent-header-name" id="hName">読み込み中...</div>
    <div class="agent-header-role" id="hRole"></div>
  </div>
  <div class="status-area">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusLabel">切断中</span>
  </div>
  <button class="back-btn" onclick="window.close()">✕ 閉じる</button>
</header>

<div class="chat-area" id="chatArea">
  <!-- エージェント出力バブル (常に1つ、更新し続ける) -->
  <div class="bubble-agent" id="agentBubble" style="display:none">
    <div class="bubble-agent-avatar" id="bubbleAvatar"></div>
    <div class="bubble-agent-body">
      <div class="bubble-agent-name" id="bubbleName"></div>
      <div class="bubble-terminal" id="bubbleTerminal"></div>
    </div>
  </div>
</div>

<div class="input-area">
  <textarea id="talkInput" placeholder="メッセージを入力... (Shift+Enterで改行、Enterで送信)" rows="1"></textarea>
  <button class="send-btn" id="sendBtn">送信</button>
</div>

<script>
(function () {
  var agentId = location.pathname.split('/').pop().split('?')[0];
  var companyId = new URLSearchParams(location.search).get('companyId') || '';
  var agent = null;
  var ws = null;
  var lastHtml = '';
  function api(p) {
    return '/api/companies/' + encodeURIComponent(companyId) + p;
  }

  function escHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function ansiToHtml(raw) {
    var text = raw.replace(/\x1b\][^\x07\x1b]*(?:\x07|\x1b\\)/g, '');
    text = text.replace(/\x1b\[(?![0-9;]*m)[^a-zA-Z]*[a-zA-Z]/g, '');
    var parts = text.split(/(\x1b\[[0-9;]*m)/);
    var result = '', open = false, cls = [];
    for (var i = 0; i < parts.length; i++) {
      var part = parts[i];
      var m = part.match(/^\x1b\[([0-9;]*)m$/);
      if (m) {
        if (open) { result += '</span>'; open = false; }
        var codes = m[1] === '' ? ['0'] : m[1].split(';');
        for (var j = 0; j < codes.length; j++) {
          var n = parseInt(codes[j], 10);
          if (n === 0) cls = [];
          else if (n === 1) cls.push('ansi-bold');
          else if ((n >= 30 && n <= 37) || (n >= 90 && n <= 97)) {
            cls = cls.filter(function(c){ return c === 'ansi-bold'; });
            cls.push('ansi-' + n);
          }
        }
        if (cls.length) { result += '<span class="' + cls.join(' ') + '">'; open = true; }
      } else {
        result += escHtml(part);
      }
    }
    if (open) result += '</span>';
    return result;
  }

  function applyAgentColor(color) {
    document.documentElement.style.setProperty('--agent-color', color);
  }

  function setHeader(a) {
    document.title = a.name + ' とトーク';
    document.getElementById('hAvatar').textContent = a.avatar;
    document.getElementById('hName').textContent = a.name;
    document.getElementById('hRole').textContent = a.role + (a.project ? '  ／  📁 ' + a.project : '');
    document.getElementById('bubbleAvatar').textContent = a.avatar;
    document.getElementById('bubbleName').textContent = a.name;
    applyAgentColor(a.color);
    document.getElementById('agentBubble').style.display = 'flex';
  }

  function loadAgent(cb) {
    function fetchAgents() {
      fetch(api('/agents'))
        .then(function (r) {
          return r.json();
        })
        .then(function (list) {
          var found = list.filter(function (a) {
            return a.id === agentId;
          })[0];
          if (found) {
            agent = found;
            setHeader(agent);
          } else document.getElementById('hName').textContent = '不明なエージェント';
          if (cb) cb();
        })
        .catch(function () {
          document.getElementById('hName').textContent = '読み込み失敗';
        });
    }
    if (!companyId) {
      fetch('/api/companies')
        .then(function (r) {
          return r.json();
        })
        .then(function (L) {
          if (L[0]) {
            companyId = L[0].id;
            fetchAgents();
          } else document.getElementById('hName').textContent = '会社がありません';
        });
      return;
    }
    fetchAgents();
  }

  // ── WebSocket ──
  function connect() {
    if (!companyId) return;
    var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(proto + '//' + location.host + '/?companyId=' + encodeURIComponent(companyId));
    ws.onopen = function () {
      document.getElementById('statusDot').className = 'status-dot connected';
      document.getElementById('statusLabel').textContent = '接続中';
    };
    ws.onclose = function () {
      document.getElementById('statusDot').className = 'status-dot';
      document.getElementById('statusLabel').textContent = '切断中（再接続中...）';
      setTimeout(connect, 2000);
    };
    ws.onerror = function () { ws.close(); };
    ws.onmessage = function (e) {
      var msg;
      try {
        msg = JSON.parse(e.data);
      } catch (err) {
        return;
      }
      if (msg.companyId && msg.companyId !== companyId) return;
      if (msg.type === 'agents') {
        var found = msg.agents.find(function (a) { return a.id === agentId; });
        if (found) { agent = found; setHeader(agent); }
      } else if (msg.type === 'output') {
        if (msg.panes && msg.panes[agentId] !== undefined) {
          updateAgentBubble(msg.panes[agentId].content || '');
        }
      }
    };
  }

  function updateAgentBubble(raw) {
    var trimmed = raw.replace(/\n+$/, '');
    var html = ansiToHtml(trimmed);
    if (html === lastHtml) return;
    lastHtml = html;
    var terminal = document.getElementById('bubbleTerminal');
    terminal.innerHTML = html;
    terminal.scrollTop = terminal.scrollHeight;
    // チャットエリアを末尾にスクロール
    var chat = document.getElementById('chatArea');
    chat.scrollTop = chat.scrollHeight;
  }

  // ── メッセージ送信 ──
  function addUserBubble(text) {
    var chat = document.getElementById('chatArea');
    var div = document.createElement('div');
    div.className = 'bubble-user';
    var now = new Date();
    var timeStr = now.getHours() + ':' + ('0' + now.getMinutes()).slice(-2);
    div.innerHTML =
      '<div class="bubble-user-body">' + escHtml(text) + '</div>' +
      '<div class="bubble-user-time">' + timeStr + '</div>';

    // agentBubbleの前に挿入（agentBubbleは常に最後）
    var agentBubble = document.getElementById('agentBubble');
    chat.insertBefore(div, agentBubble);
    chat.scrollTop = chat.scrollHeight;
  }

  function sendMessage() {
    var inp = document.getElementById('talkInput');
    var text = inp.value.trim();
    if (!text) return;
    if (!agent) { alert('エージェント情報を読み込み中です'); return; }
    addUserBubble(text);
    if (ws && ws.readyState === 1) {
      ws.send(JSON.stringify({ type: 'send', agentId: agentId, text: text, companyId: companyId }));
    }
    inp.value = '';
    inp.style.height = 'auto';
  }

  // ── テキストエリア自動拡張 ──
  function initTextarea() {
    var ta = document.getElementById('talkInput');
    ta.addEventListener('input', function () {
      ta.style.height = 'auto';
      ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
    });
    ta.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    document.getElementById('sendBtn').addEventListener('click', sendMessage);
  }

  loadAgent(connect);
  initTextarea();
})();
</script>
</body>
</html>
