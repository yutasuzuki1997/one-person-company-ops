<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>プロジェクト管理 - AI Agents</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #060810; --bg2: #0d1117; --bg3: #161b27;
    --border: #1e2a3a; --text: #e2e8f0; --text2: #94a3b8;
    --accent: #38bdf8; --danger: #f87171; --success: #34d399;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
  }

  /* ── ヘッダー ── */
  header {
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 54px;
    display: flex; align-items: center; gap: 0;
    position: sticky; top: 0; z-index: 100;
  }
  .header-logo { font-size: 15px; font-weight: 700; margin-right: 28px; white-space: nowrap; }
  .header-logo span { color: var(--accent); }
  nav { display: flex; gap: 4px; }
  .nav-link {
    padding: 6px 14px; border-radius: 6px;
    font-size: 13px; font-weight: 500; color: var(--text2);
    text-decoration: none; transition: background 0.15s, color 0.15s;
  }
  .nav-link:hover { background: var(--bg3); color: var(--text); }
  .nav-link.active { background: var(--bg3); color: var(--accent); }

  /* ── メインレイアウト ── */
  main { max-width: 1100px; margin: 0 auto; padding: 32px 24px 60px; }

  /* ── セクションヘッダー ── */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px; padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .section-title { font-size: 20px; font-weight: 700; }
  .section-subtitle { font-size: 12px; color: var(--text2); margin-top: 3px; }

  /* ── ボタン ── */
  .btn {
    padding: 7px 16px; border-radius: 7px; border: none;
    cursor: pointer; font-size: 13px; font-weight: 600;
    transition: opacity 0.15s, transform 0.1s; white-space: nowrap;
  }
  .btn:active { transform: scale(0.97); }
  .btn-accent { background: var(--accent); color: #000; }
  .btn-accent:hover { opacity: 0.85; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text2); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-sm { background: transparent; border: 1px solid var(--border); color: var(--text2); padding: 5px 10px; font-size: 12px; border-radius: 5px; cursor: pointer; }
  .btn-sm:hover { border-color: var(--text2); color: var(--text); }
  .btn-danger-outline { background: transparent; border: 1px solid transparent; color: var(--danger); padding: 5px 10px; font-size: 12px; border-radius: 5px; cursor: pointer; }
  .btn-danger-outline:hover { border-color: var(--danger); }

  /* ── プロジェクトグリッド ── */
  .projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
  }

  /* ── プロジェクトカード ── */
  .project-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
    display: flex; flex-direction: column;
    transition: box-shadow 0.2s;
    --project-color: #38bdf8;
  }
  .project-card:hover { box-shadow: 0 0 18px -4px var(--project-color); }

  .project-card-top { height: 4px; background: var(--project-color); flex-shrink: 0; }

  .project-card-body { padding: 16px 18px 12px; flex: 1; }

  .project-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .project-card-name { font-size: 16px; font-weight: 700; line-height: 1.3; }
  .agent-count-badge {
    display: flex; align-items: center; gap: 4px;
    background: var(--bg3); border: 1px solid var(--border);
    padding: 3px 8px; border-radius: 20px;
    font-size: 11px; color: var(--text2);
    white-space: nowrap; flex-shrink: 0;
  }
  .agent-count-badge .count { font-weight: 700; color: var(--project-color); }

  .project-card-desc {
    font-size: 12px; color: var(--text2);
    margin-top: 6px; line-height: 1.6;
  }

  .project-card-paths { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; }
  .path-row {
    background: var(--bg3); border-radius: 6px;
    padding: 7px 10px;
    display: flex; flex-direction: column; gap: 2px;
  }
  .path-label { font-size: 10px; color: var(--text2); opacity: 0.7; }
  .path-value {
    font-size: 11px; font-family: 'JetBrains Mono', Consolas, monospace;
    color: var(--text2); word-break: break-all; line-height: 1.4;
  }
  .path-row.empty .path-value { color: var(--border); font-style: italic; font-family: inherit; }

  .project-card-agents {
    margin-top: 12px;
    display: flex; flex-wrap: wrap; gap: 5px;
  }
  .agent-chip {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--bg3); border: 1px solid var(--border);
    padding: 2px 8px; border-radius: 20px;
    font-size: 11px; color: var(--text2);
  }

  .project-card-actions {
    padding: 10px 18px 14px;
    border-top: 1px solid var(--border);
    display: flex; gap: 6px; align-items: center;
  }

  /* ── 空状態 ── */
  .empty-state {
    padding: 48px; text-align: center;
    color: var(--text2); font-size: 14px;
    background: var(--bg2); border: 1px dashed var(--border);
    border-radius: 12px;
  }
  .empty-state .empty-icon { font-size: 40px; margin-bottom: 14px; }
  .empty-state p { margin-top: 8px; font-size: 12px; opacity: 0.7; }

  /* ── モーダル ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.78); z-index: 200;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 14px; padding: 24px;
    width: 500px; max-width: 95vw; max-height: 92vh; overflow-y: auto;
  }
  .modal::-webkit-scrollbar { width: 4px; }
  .modal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .modal h2 { font-size: 16px; margin-bottom: 20px; }

  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 11px; color: var(--text2); margin-bottom: 5px; }
  .form-group input[type="text"],
  .form-group textarea {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); padding: 8px 12px; border-radius: 7px;
    font-size: 13px; outline: none; font-family: inherit;
  }
  .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 72px; line-height: 1.5; }
  .form-hint { font-size: 10px; color: var(--text2); margin-top: 4px; opacity: 0.7; }

  /* カラースウォッチ */
  .modal-section { margin: 18px 0 14px; padding-top: 16px; border-top: 1px solid var(--border); }
  .modal-section-label {
    font-size: 11px; font-weight: 700; color: var(--accent);
    letter-spacing: 0.08em; margin-bottom: 12px;
    display: flex; align-items: center; gap: 6px;
  }
  .modal-section-label::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, var(--accent), transparent); opacity: 0.3;
  }

  .color-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .color-swatch {
    width: 28px; height: 28px; border-radius: 50%;
    border: 2px solid transparent; cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
    position: relative;
  }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.selected { border-color: #fff; transform: scale(1.2); }

  /* カラープレビュー */
  .color-preview-row {
    display: flex; align-items: center; gap: 10px; margin-top: 10px;
  }
  .color-preview-bar {
    height: 4px; flex: 1; border-radius: 2px;
    transition: background 0.2s;
  }
  .color-preview-hex { font-size: 11px; color: var(--text2); font-family: monospace; }

  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 22px; }

  /* ── トースト ── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--bg2); border: 1px solid var(--border);
    padding: 10px 20px; border-radius: 8px; font-size: 13px;
    z-index: 300; opacity: 0; transition: opacity 0.2s;
    pointer-events: none; white-space: nowrap;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="header-logo">⚡ AI <span>Agents</span></div>
  <nav>
    <a href="/" class="nav-link">ダッシュボード</a>
    <a href="/settings" class="nav-link">社員管理</a>
    <a href="/projects-page" class="nav-link active">プロジェクト管理</a>
  </nav>
</header>

<main>
  <div class="section-header">
    <div>
      <div class="section-title">📁 プロジェクト管理</div>
      <div class="section-subtitle">リポジトリ・ナレッジパスの管理と担当エージェントの確認</div>
    </div>
    <button class="btn btn-accent" id="addBtn">＋ プロジェクトを追加</button>
  </div>
  <div class="projects-grid" id="projectsGrid"></div>
</main>

<div id="toast"></div>

<!-- プロジェクトモーダル -->
<div class="modal-overlay" id="projectModal">
  <div class="modal">
    <h2 id="modalTitle">プロジェクトを追加</h2>

    <div class="form-group">
      <label>プロジェクト名 *</label>
      <input type="text" id="pName" placeholder="例: ECサイト刷新">
    </div>

    <div class="form-group">
      <label>概要</label>
      <textarea id="pDesc" placeholder="例: Next.js + Supabase で構築するECサイト。決済はStripe。"></textarea>
    </div>

    <div class="form-group">
      <label>作業リポジトリのパス (repoPath)</label>
      <input type="text" id="pRepoPath" placeholder="例: ~/projects/noborder">
      <div class="form-hint">エージェントがコードを書き込む作業ディレクトリ</div>
    </div>

    <div class="form-group">
      <label>参照データのパス (knowledgePath)</label>
      <input type="text" id="pKnowledgePath" placeholder="例: ~/projects/wein-knowledge/projects/noborder">
      <div class="form-hint">仕様書・ドキュメントなど参照用のディレクトリ</div>
    </div>

    <div class="modal-section">
      <div class="modal-section-label">🎨 カラー</div>
      <div class="color-grid" id="colorGrid"></div>
      <div class="color-preview-row">
        <div class="color-preview-bar" id="colorPreviewBar"></div>
        <span class="color-preview-hex" id="colorPreviewHex"></span>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" id="modalCancel">キャンセル</button>
      <button class="btn btn-accent" id="modalSave">保存</button>
    </div>
  </div>
</div>

<script>
(function () {
  var COLORS = [
    '#38bdf8','#f472b6','#a78bfa','#34d399',
    '#fbbf24','#fb923c','#ef4444','#22c55e',
    '#e879f9','#818cf8','#06b6d4','#f59e0b'
  ];

  var projects = [];
  var agents = [];
  var editingId = null;
  var selectedColor = COLORS[0];
  var companyId = new URLSearchParams(location.search).get('companyId');
  function api(p) {
    return '/api/companies/' + encodeURIComponent(companyId) + p;
  }

  // ── ユーティリティ ──
  function escHtml(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
  function hexToRgba(hex, alpha) {
    var r = parseInt(hex.slice(1, 3), 16);
    var g = parseInt(hex.slice(3, 5), 16);
    var b = parseInt(hex.slice(5, 7), 16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
  }

  // ── トースト ──
  function toast(msg, isError) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.style.borderColor = isError ? 'var(--danger)' : 'var(--success)';
    el.style.color = isError ? 'var(--danger)' : 'var(--success)';
    el.classList.add('show');
    setTimeout(function () { el.classList.remove('show'); }, 3000);
  }

  // ── データ取得 ──
  function fetchAll() {
    return Promise.all([
      fetch(api('/projects')).then(function (r) {
        return r.json();
      }),
      fetch(api('/agents')).then(function (r) {
        return r.json();
      }),
    ]).then(function (results) {
      projects = results[0];
      agents = results[1];
      renderProjects();
    });
  }
  function boot() {
    if (!companyId) {
      fetch('/api/companies')
        .then(function (r) {
          return r.json();
        })
        .then(function (L) {
          if (!L[0]) {
            toast('ダッシュボードで会社を作成してください', true);
            return;
          }
          companyId = L[0].id;
          history.replaceState(null, '', '?companyId=' + companyId);
          fetchAll();
        });
      return;
    }
    fetchAll();
  }

  // ── エージェント数算出 ──
  function getAgentsForProject(projectId) {
    return agents.filter(function (a) { return a.projectId === projectId; });
  }

  // ── プロジェクト描画 ──
  function renderProjects() {
    var grid = document.getElementById('projectsGrid');
    if (projects.length === 0) {
      grid.innerHTML =
        '<div class="empty-state">' +
          '<div class="empty-icon">📁</div>' +
          'プロジェクトがありません' +
          '<p>「＋ プロジェクトを追加」から最初のプロジェクトを登録してください。</p>' +
        '</div>';
      return;
    }

    grid.innerHTML = '';
    projects.forEach(function (proj) {
      var color = proj.color || '#38bdf8';
      var assignedAgents = getAgentsForProject(proj.id);
      var card = document.createElement('div');
      card.className = 'project-card';
      card.style.setProperty('--project-color', color);

      // 担当エージェントチップ
      var chipsHtml = '';
      if (assignedAgents.length > 0) {
        chipsHtml = '<div class="project-card-agents">';
        assignedAgents.forEach(function (a) {
          chipsHtml += '<span class="agent-chip">' + a.avatar + ' ' + escHtml(a.name) + '</span>';
        });
        chipsHtml += '</div>';
      }

      // パス行
      var repoHtml = proj.repoPath
        ? '<div class="path-row"><div class="path-label">📂 作業リポジトリ</div><div class="path-value">' + escHtml(proj.repoPath) + '</div></div>'
        : '<div class="path-row empty"><div class="path-label">📂 作業リポジトリ</div><div class="path-value">未設定</div></div>';
      var knowledgeHtml = proj.knowledgePath
        ? '<div class="path-row"><div class="path-label">📚 参照データ</div><div class="path-value">' + escHtml(proj.knowledgePath) + '</div></div>'
        : '<div class="path-row empty"><div class="path-label">📚 参照データ</div><div class="path-value">未設定</div></div>';

      card.innerHTML =
        '<div class="project-card-top"></div>' +
        '<div class="project-card-body">' +
          '<div class="project-card-header">' +
            '<div class="project-card-name">' + escHtml(proj.name) + '</div>' +
            '<div class="agent-count-badge">' +
              '👥 <span class="count">' + assignedAgents.length + '</span> 名' +
            '</div>' +
          '</div>' +
          (proj.description ? '<div class="project-card-desc">' + escHtml(proj.description) + '</div>' : '') +
          '<div class="project-card-paths">' + repoHtml + knowledgeHtml + '</div>' +
          chipsHtml +
        '</div>' +
        '<div class="project-card-actions">' +
          '<button class="btn-sm" data-edit>編集</button>' +
          '<span style="flex:1"></span>' +
          '<button class="btn-danger-outline" data-del>削除</button>' +
        '</div>';

      (function (id, name) {
        card.querySelector('[data-edit]').addEventListener('click', function () { openEditModal(id); });
        card.querySelector('[data-del]').addEventListener('click', function () { deleteProject(id, name); });
      })(proj.id, proj.name);

      grid.appendChild(card);
    });
  }

  // ── CRUD ──
  function deleteProject(id, name) {
    if (!confirm('「' + name + '」を削除しますか?\n担当エージェントのプロジェクト割り当ては解除されません。')) return;
    fetch(api('/projects/' + id), { method: 'DELETE' })
      .then(function () { return fetchAll(); })
      .then(function () { toast(name + ' を削除しました'); });
  }

  // ── モーダル ──
  function initModal() {
    var colorGrid = document.getElementById('colorGrid');
    COLORS.forEach(function (c) {
      var el = document.createElement('div');
      el.className = 'color-swatch';
      el.style.background = c;
      el.title = c;
      el.addEventListener('click', function () {
        setColor(c);
      });
      colorGrid.appendChild(el);
    });

    document.getElementById('addBtn').addEventListener('click', openAddModal);
    document.getElementById('modalCancel').addEventListener('click', closeModal);
    document.getElementById('modalSave').addEventListener('click', saveModal);
    document.getElementById('projectModal').addEventListener('click', function (e) {
      if (e.target === e.currentTarget) closeModal();
    });
  }

  function setColor(c) {
    selectedColor = c;
    document.querySelectorAll('#colorGrid .color-swatch').forEach(function (el) {
      el.classList.toggle('selected', el.title === c);
    });
    document.getElementById('colorPreviewBar').style.background = c;
    document.getElementById('colorPreviewHex').textContent = c;
  }

  function openAddModal() {
    editingId = null;
    document.getElementById('modalTitle').textContent = 'プロジェクトを追加';
    document.getElementById('pName').value = '';
    document.getElementById('pDesc').value = '';
    document.getElementById('pRepoPath').value = '';
    document.getElementById('pKnowledgePath').value = '';
    setColor(COLORS[0]);
    document.getElementById('projectModal').classList.add('open');
    document.getElementById('pName').focus();
  }

  function openEditModal(id) {
    var proj = projects.find(function (p) { return p.id === id; });
    if (!proj) return;
    editingId = id;
    document.getElementById('modalTitle').textContent = 'プロジェクトを編集';
    document.getElementById('pName').value = proj.name;
    document.getElementById('pDesc').value = proj.description || '';
    document.getElementById('pRepoPath').value = proj.repoPath || '';
    document.getElementById('pKnowledgePath').value = proj.knowledgePath || '';
    setColor(proj.color || COLORS[0]);
    document.getElementById('projectModal').classList.add('open');
    document.getElementById('pName').focus();
  }

  function closeModal() {
    document.getElementById('projectModal').classList.remove('open');
  }

  function saveModal() {
    var name = document.getElementById('pName').value.trim();
    if (!name) { alert('プロジェクト名は必須です'); return; }
    var body = JSON.stringify({
      name: name,
      description: document.getElementById('pDesc').value.trim(),
      repoPath: document.getElementById('pRepoPath').value.trim(),
      knowledgePath: document.getElementById('pKnowledgePath').value.trim(),
      color: selectedColor
    });
    var headers = { 'Content-Type': 'application/json' };
    var req = editingId
      ? fetch(api('/projects/' + editingId), { method: 'PUT', headers: headers, body: body })
      : fetch(api('/projects'), { method: 'POST', headers: headers, body: body });
    req.then(function () {
      closeModal();
      return fetchAll();
    }).then(function () {
      toast(editingId ? 'プロジェクトを更新しました' : 'プロジェクトを追加しました');
    }).catch(function () {
      toast('エラーが発生しました', true);
    });
  }

  // ── Escキー ──
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') closeModal();
  });

  // ── 初期化 ──
  initModal();
  boot();
})();
</script>
</body>
</html>
